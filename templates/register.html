<!DOCTYPE html>
<html>

<head>
    <title>Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="profile-container">

    <h1>Create Account</h1>

    <form method="POST">

        <input
            type="text"
            name="name"
            placeholder="Full Name">

        <input
            type="email"
            name="email"
            placeholder="Email">

        <input
            type="password"
            name="password"
            placeholder="Password">

        <button type="submit">
            Register
        </button>

    </form>

</div>

</body>
</html>
