<!DOCTYPE html>
<html>

<head>
    <title>Search Results</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Search Results</h1>

    <h3>
        Results for "{{ keyword }}"
    </h3>

    {% if results %}

        {% for item in results %}

        <div class="card">

            <h2>{{ item.name }}</h2>

            <p>
                <strong>Type:</strong>
                {{ item.type }}
            </p>

            <p>
                {{ item.description }}
            </p>

        </div>

        {% endfor %}

    {% else %}

        <p>No results found.</p>

    {% endif %}

    <br>

    <a href="/dashboard">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
